{{- if .Values.client.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "smartdoc.client.fullname" . }}
  labels:
    {{- include "smartdoc.labels" . | nindent 4 }}
    app.kubernetes.io/component: client
spec:
  # ClusterIP — exposed to the public internet through the Ingress below.
  type: ClusterIP
  ports:
    - port: {{ .Values.client.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "smartdoc.selectorLabels" (dict "context" . "component" "client") | nindent 4 }}
{{- end }}
