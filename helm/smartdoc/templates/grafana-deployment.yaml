{{- if .Values.grafana.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "smartdoc.grafana.fullname" . }}
  labels:
    {{- include "smartdoc.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
spec:
  replicas: {{ .Values.grafana.replicas }}
  selector:
    matchLabels:
      {{- include "smartdoc.selectorLabels" (dict "context" . "component" "grafana") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "smartdoc.labels" . | nindent 8 }}
        app.kubernetes.io/component: grafana
      annotations:
        # Roll pods when any provisioning ConfigMap changes.
        checksum/datasources: {{ include (print $.Template.BasePath "/configmap-grafana-datasources.yaml") . | sha256sum }}
        checksum/dashboards-provider: {{ include (print $.Template.BasePath "/configmap-grafana-dashboards-provider.yaml") . | sha256sum }}
        checksum/dashboards: {{ include (print $.Template.BasePath "/configmap-grafana-dashboards.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: grafana
          image: "{{ .Values.grafana.image.repository }}:{{ .Values.grafana.image.tag }}"
          imagePullPolicy: {{ .Values.grafana.image.pullPolicy | default .Values.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.grafana.service.port }}
          env:
            # Admin credentials are sourced from the Secret by name only.
            # The Secret itself (and its contents) is never hardcoded here.
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "smartdoc.grafana.secretName" . }}
                  key: {{ .Values.grafana.adminUserKey }}
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "smartdoc.grafana.secretName" . }}
                  key: {{ .Values.grafana.adminPasswordKey }}
            # Disable the Grafana first-run "change password" prompt in dev.
            - name: GF_SECURITY_DISABLE_INITIAL_ADMIN_CREATION
              value: "false"
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            # Prometheus data source auto-provisioning.
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            # Dashboard provider configuration (tells Grafana where to load JSONs from).
            - name: dashboards-provider
              mountPath: /etc/grafana/provisioning/dashboards
            # Dashboard JSON files.
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
          resources:
            {{- toYaml .Values.grafana.resources | nindent 12 }}
      volumes:
        - name: datasources
          configMap:
            name: {{ include "smartdoc.grafana.fullname" . }}-datasources
        - name: dashboards-provider
          configMap:
            name: {{ include "smartdoc.grafana.fullname" . }}-dashboards-provider
        - name: dashboards
          configMap:
            name: {{ include "smartdoc.grafana.fullname" . }}-dashboards
{{- end }}
