{{- if .Values.prometheus.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "smartdoc.prometheus.fullname" . }}
  labels:
    {{- include "smartdoc.labels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
spec:
  # ClusterIP - Prometheus is an internal component. Access it via port-forward
  # for ad-hoc queries. It is never exposed through the Ingress.
  type: ClusterIP
  ports:
    - port: {{ .Values.prometheus.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "smartdoc.selectorLabels" (dict "context" . "component" "prometheus") | nindent 4 }}
{{- end }}
