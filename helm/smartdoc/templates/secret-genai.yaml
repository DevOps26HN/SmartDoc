{{- if and .Values.genai.enabled (not .Values.genai.existingSecret) .Values.genai.apiKey }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "smartdoc.genai.fullname" . }}
  labels:
    {{- include "smartdoc.labels" . | nindent 4 }}
    app.kubernetes.io/component: genai
type: Opaque
stringData:
  # Chart-managed cloud API key. Supplied at install time
  # (`--set genai.apiKey=...`) and NOT a real credential committed to git.
  # On a shared cluster prefer `genai.existingSecret` to keep it fully out-of-band.
  {{ .Values.genai.apiKeySecretKey }}: {{ .Values.genai.apiKey | quote }}
{{- end }}
