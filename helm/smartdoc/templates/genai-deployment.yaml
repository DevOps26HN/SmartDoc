{{- if .Values.genai.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "smartdoc.genai.fullname" . }}
  labels:
    {{- include "smartdoc.labels" . | nindent 4 }}
    app.kubernetes.io/component: genai
spec:
  replicas: {{ .Values.genai.replicas }}
  selector:
    matchLabels:
      {{- include "smartdoc.selectorLabels" (dict "context" . "component" "genai") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "smartdoc.labels" . | nindent 8 }}
        app.kubernetes.io/component: genai
      annotations:
        # Roll the pods when the non-secret config changes.
        checksum/config: {{ include (print $.Template.BasePath "/configmap-genai.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: genai
          image: "{{ .Values.genai.image.repository }}:{{ .Values.genai.image.tag }}"
          imagePullPolicy: {{ .Values.genai.image.pullPolicy | default .Values.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.genai.service.port }}
          envFrom:
            # Non-secret backend/model configuration.
            - configMapRef:
                name: {{ include "smartdoc.genai.fullname" . }}-config
          env:
            - name: GENAI_PORT
              value: {{ .Values.genai.service.port | quote }}
            {{- if or .Values.genai.existingSecret .Values.genai.apiKey }}
            # Cloud API key — the only secret value, sourced from a Secret.
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "smartdoc.genai.secretName" . }}
                  key: {{ .Values.genai.apiKeySecretKey }}
            {{- end }}
            {{- with .Values.genai.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.genai.resources | nindent 12 }}
{{- end }}
