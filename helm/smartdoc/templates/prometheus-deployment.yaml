{{- if .Values.prometheus.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "smartdoc.prometheus.fullname" . }}
  labels:
    {{- include "smartdoc.labels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
spec:
  replicas: {{ .Values.prometheus.replicas }}
  selector:
    matchLabels:
      {{- include "smartdoc.selectorLabels" (dict "context" . "component" "prometheus") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "smartdoc.labels" . | nindent 8 }}
        app.kubernetes.io/component: prometheus
      annotations:
        # Roll pods when either ConfigMap changes.
        checksum/config: {{ include (print $.Template.BasePath "/configmap-prometheus.yaml") . | sha256sum }}
        checksum/rules: {{ include (print $.Template.BasePath "/configmap-prometheus-rules.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: prometheus
          image: "{{ .Values.prometheus.image.repository }}:{{ .Values.prometheus.image.tag }}"
          imagePullPolicy: {{ .Values.prometheus.image.pullPolicy | default .Values.imagePullPolicy }}
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --storage.tsdb.retention.time={{ .Values.prometheus.retention }}
            - --web.console.libraries=/usr/share/prometheus/console_libraries
            - --web.console.templates=/usr/share/prometheus/consoles
          ports:
            - name: http
              containerPort: {{ .Values.prometheus.service.port }}
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            # Main scrape / rule_files configuration.
            - name: config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
            # Alerting rules - Task 8.3 (#104) will enrich alerts.yml here.
            - name: rules
              mountPath: /etc/prometheus/rules
          resources:
            {{- toYaml .Values.prometheus.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "smartdoc.prometheus.fullname" . }}-config
        - name: rules
          configMap:
            name: {{ include "smartdoc.prometheus.fullname" . }}-rules
{{- end }}
