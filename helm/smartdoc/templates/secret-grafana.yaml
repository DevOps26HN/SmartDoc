{{- if and .Values.grafana.enabled (not .Values.grafana.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "smartdoc.grafana.fullname" . }}
  labels:
    {{- include "smartdoc.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
type: Opaque
stringData:
  # Chart-managed Grafana credentials. Supply a strong password at install time
  # (`--set grafana.adminPassword=...`) and do NOT commit real values to git.
  # On a shared cluster prefer `grafana.existingSecret` to keep it fully out-of-band.
  {{ .Values.grafana.adminUserKey }}: {{ .Values.grafana.adminUser | quote }}
  {{ .Values.grafana.adminPasswordKey }}: {{ required "grafana.adminPassword is required when grafana.existingSecret is not set - pass it with --set grafana.adminPassword=..." .Values.grafana.adminPassword | quote }}
{{- end }}
