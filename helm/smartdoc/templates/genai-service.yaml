{{- if .Values.genai.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "smartdoc.genai.fullname" . }}
  labels:
    {{- include "smartdoc.labels" . | nindent 4 }}
    app.kubernetes.io/component: genai
spec:
  # ClusterIP — the GenAI service is an internal component (like the database).
  # It is reached only by the server, never through the Ingress.
  type: ClusterIP
  ports:
    - port: {{ .Values.genai.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "smartdoc.selectorLabels" (dict "context" . "component" "genai") | nindent 4 }}
{{- end }}
