{{- if .Values.grafana.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "smartdoc.grafana.fullname" . }}
  labels:
    {{- include "smartdoc.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
spec:
  # ClusterIP - Grafana is an internal component. Access it via port-forward
  # for dashboard viewing. It is never exposed through the Ingress.
  type: ClusterIP
  ports:
    - port: {{ .Values.grafana.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "smartdoc.selectorLabels" (dict "context" . "component" "grafana") | nindent 4 }}
{{- end }}
