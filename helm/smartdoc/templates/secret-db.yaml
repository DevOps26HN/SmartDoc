{{- if and .Values.db.enabled (not .Values.db.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "smartdoc.db.fullname" . }}
  labels:
    {{- include "smartdoc.labels" . | nindent 4 }}
    app.kubernetes.io/component: db
type: Opaque
stringData:
  # Chart-managed password. The value is supplied at install time
  # (`--set db.password=...`) and is NOT a real credential committed to git.
  # On the cluster prefer `db.existingSecret` to keep the value fully
  # out-of-band.
  {{ .Values.db.existingSecretPasswordKey }}: {{ required "db.password is required when db.existingSecret is not set — pass it with --set db.password=..." .Values.db.password | quote }}
{{- end }}
