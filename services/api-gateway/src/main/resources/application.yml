server:
  port: 8080

spring:
  application:
    name: api-gateway
  data:
    redis:
      host: localhost
      port: 6379

  cloud:
    gateway:
      default-filters:
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 10
            redis-rate-limiter.burstCapacity: 20
            key-resolver: "#{@userKeyResolver}"
      routes:
        # JWKS Route
        - id: jwks
          uri: http://localhost:8083
          predicates:
            - Path=/.well-known/jwks.json

        # Auth Routes
        - id: auth-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/auth/**

        # Document Routes
        - id: document-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/documents/**

        # QA Routes (to AI Service)
        - id: qa-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/qa/**

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:8083/.well-known/jwks.json

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  endpoint:
    health:
      show-details: always
