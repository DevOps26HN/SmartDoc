server.port=${SERVER_PORT:8080}
spring.application.name=document-service

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/smartdoc}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update

# GenAI microservice (internal). The base URL is environment-specific and is
# injected at runtime: http://genai:8000 locally (docker-compose), or the
# in-cluster Service name from a ConfigMap on the AET cluster. Never hardcoded.
genai.base-url=${GENAI_BASE_URL:http://localhost:8000}
genai.summarize-path=${GENAI_SUMMARIZE_PATH:/summarize}
genai.ask-path=${GENAI_ASK_PATH:/ask}
genai.health-path=${GENAI_HEALTH_PATH:/health}
genai.connect-timeout-seconds=${GENAI_CONNECT_TIMEOUT_SECONDS:5}
genai.read-timeout-seconds=${GENAI_READ_TIMEOUT_SECONDS:120}
genai.default-max-words=${GENAI_DEFAULT_MAX_WORDS:80}
