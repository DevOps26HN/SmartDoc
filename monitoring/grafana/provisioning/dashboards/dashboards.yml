# Grafana dashboard provider for the local docker-compose stack. Dashboards are
# provisioned from committed .json files (mounted read-only), not hand-built in
# a running instance. Mirrors helm/.../configmap-grafana-dashboards-provider.yaml.
apiVersion: 1
providers:
  - name: SmartDoc
    orgId: 1
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
