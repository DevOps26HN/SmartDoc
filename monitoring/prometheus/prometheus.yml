# Prometheus configuration for the LOCAL docker-compose monitoring stack
# (Task 8.3 / W09H01). Targets are addressed by their compose service names on
# the internal network — never hardcoded host/public addresses. The in-cluster
# equivalent is rendered by helm/smartdoc/templates/configmap-prometheus.yaml
# and uses the same job names, so the committed Grafana dashboards work in both.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Alert rules are loaded from the mounted rules directory.
rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  # Prometheus scrapes itself.
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  # Spring Boot server — Actuator/Micrometer Prometheus endpoint.
  - job_name: smartdoc-server
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - server:8080

  # GenAI FastAPI service — prometheus-fastapi-instrumentator endpoint.
  - job_name: smartdoc-genai
    metrics_path: /metrics
    static_configs:
      - targets:
          - genai:8000
