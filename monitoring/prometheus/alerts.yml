groups:
  - name: smartdoc.availability
    rules:
      # Fires when any scrape target (server, genai, prometheus) has been
      # unreachable for more than 1 minute. Demonstrably evaluating: stop a
      # service (e.g. `docker compose stop genai`) and the alert moves to
      # Pending then Firing within ~1 minute.
      - alert: InstanceDown
        expr: up == 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Instance {{ $labels.instance }} is down"
          description: "Scrape target {{ $labels.instance }} (job={{ $labels.job }}) has been unreachable for more than 1 minute."

  - name: smartdoc.latency
    rules:
      # Fires when the server's p95 request latency stays above 1.5s for 2
      # minutes — a real "slow response time" condition on live traffic. The
      # threshold is reachable under load (and lowerable for a demo), so it is
      # not a placeholder that can never fire.
      - alert: HighServerLatencyP95
        expr: histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket{job="smartdoc-server"}[5m])) by (le)) > 1.5
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High p95 latency on smartdoc-server"
          description: "Server p95 request latency has exceeded 1.5s for over 2 minutes (current: {{ $value }}s)."
